services:
  web:
    build:
      context: .
    ports:
      - "4321:4321"
    environment:
      NODE_ENV: production

  postgres:
    image: postgres:17-alpine
    profiles:
      - infra
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rwscargo
      POSTGRES_USER: rwscargo
      POSTGRES_PASSWORD: rwscargo_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    profiles:
      - infra
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
